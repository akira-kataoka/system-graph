<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Graph — システム構成 / データリネージマップ</title>
<style>
  :root {
    --bg:#eef1f6; --bg-2:#f6f8fb; --grid:rgba(70,90,130,.11);
    --glass:rgba(255,255,255,.7); --glass-solid:#ffffff; --panel-2:rgba(120,140,175,.09);
    --border:rgba(30,45,80,.11); --border-strong:rgba(30,45,80,.18);
    --text:#131a2b; --text-dim:#5f6b83; --text-mute:#93a0b8;
    --accent:#4f46e5; --accent-soft:rgba(79,70,229,.12);
    --edge:rgba(120,135,165,.5); --edge-hl:#4f46e5;
    --shadow:0 10px 34px rgba(20,35,75,.14); --shadow-sm:0 2px 10px rgba(20,35,75,.10);
    /* containers */
    --c-system:#64748b; --c-database:#0d9488; --c-platform:#7c3aed;
    /* leaf nodes (with gradient partner) */
    --c-table:#4f46e5;   --c-table-2:#a5b4fc;
    --c-job:#e0820a;     --c-job-2:#fcd34d;
    --c-external:#e11d5b;--c-external-2:#fda4af;
  }
  :root[data-theme="dark"] {
    --bg:#0a0d15; --bg-2:#0d121c; --grid:rgba(150,175,220,.09);
    --glass:rgba(19,25,38,.64); --glass-solid:#141b28; --panel-2:rgba(150,175,220,.06);
    --border:rgba(150,180,225,.12); --border-strong:rgba(150,180,225,.2);
    --text:#e8ecf5; --text-dim:#93a0b8; --text-mute:#697590;
    --accent:#818cf8; --accent-soft:rgba(129,140,248,.16);
    --edge:rgba(150,170,210,.34); --edge-hl:#a5b4fc;
    --shadow:0 12px 44px rgba(0,0,0,.55); --shadow-sm:0 3px 14px rgba(0,0,0,.42);
    --c-system:#94a3b8; --c-database:#2dd4bf; --c-platform:#a78bfa;
    --c-table:#818cf8;   --c-table-2:#c7d2fe;
    --c-job:#fbbf24;     --c-job-2:#fde68a;
    --c-external:#fb7185;--c-external-2:#fecdd3;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg:#0a0d15;--bg-2:#0d121c;--grid:rgba(150,175,220,.09);--glass:rgba(19,25,38,.64);
      --glass-solid:#141b28;--panel-2:rgba(150,175,220,.06);--border:rgba(150,180,225,.12);
      --border-strong:rgba(150,180,225,.2);--text:#e8ecf5;--text-dim:#93a0b8;--text-mute:#697590;
      --accent:#818cf8;--accent-soft:rgba(129,140,248,.16);--edge:rgba(150,170,210,.34);--edge-hl:#a5b4fc;
      --shadow:0 12px 44px rgba(0,0,0,.55);--shadow-sm:0 3px 14px rgba(0,0,0,.42);
      --c-system:#94a3b8;--c-database:#2dd4bf;--c-platform:#a78bfa;
      --c-table:#818cf8;--c-table-2:#c7d2fe;--c-job:#fbbf24;--c-job-2:#fde68a;--c-external:#fb7185;--c-external-2:#fecdd3;
    }
  }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body {
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    background:var(--bg); color:var(--text); overflow:hidden;
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
  }
  #app { display:flex; flex-direction:column; height:100vh; }
  .ui-ic { width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:1.9; stroke-linecap:round; stroke-linejoin:round; flex:none; }

  /* ---------- Toolbar ---------- */
  header {
    position:absolute; top:12px; left:12px; right:12px; z-index:30;
    display:flex; align-items:center; gap:7px; flex-wrap:wrap; padding:8px 11px;
    background:var(--glass); backdrop-filter:blur(20px) saturate(1.5); -webkit-backdrop-filter:blur(20px) saturate(1.5);
    border:1px solid var(--border); border-radius:15px; box-shadow:var(--shadow);
  }
  .brand { display:flex; align-items:center; gap:9px; font-weight:750; font-size:14px; letter-spacing:.2px; margin-right:2px; white-space:nowrap; }
  .brand .logo { width:28px; height:28px; border-radius:9px; display:grid; place-items:center; background:linear-gradient(135deg,var(--accent),#0d9488); box-shadow:var(--shadow-sm); }
  .brand .logo svg { width:17px; height:17px; stroke:#fff; fill:none; stroke-width:1.8; }
  .brand small { color:var(--text-dim); font-weight:450; font-size:10.5px; }
  .sep { width:1px; align-self:stretch; background:var(--border); margin:2px 3px; }
  .spacer { flex:1 1 auto; min-width:2px; }
  .btn {
    display:inline-flex; align-items:center; gap:6px; padding:7px 11px; border:1px solid transparent;
    background:var(--panel-2); color:var(--text); border-radius:10px; font-size:12.5px; font-weight:550;
    cursor:pointer; white-space:nowrap; transition:background .14s, transform .09s, color .14s;
  }
  .btn:hover { background:var(--accent-soft); }
  .btn:active { transform:translateY(1px) scale(.98); }
  .btn.icon { padding:8px; }
  .btn.primary { background:var(--accent); color:#fff; box-shadow:var(--shadow-sm); }
  .btn.primary:hover { filter:brightness(1.08); background:var(--accent); }
  .btn.active { background:var(--accent); color:#fff; }
  .search { display:flex; align-items:center; gap:7px; padding:6px 11px; background:var(--panel-2); border:1px solid transparent; border-radius:10px; color:var(--text-dim); transition:border-color .14s, background .14s; }
  .search:focus-within { border-color:var(--accent); background:var(--glass-solid); }
  .search input { border:none; background:transparent; color:var(--text); outline:none; font-size:12.5px; width:140px; font-family:inherit; }
  .search input::placeholder { color:var(--text-mute); }

  .menu-wrap { position:relative; }
  .menu {
    position:absolute; top:calc(100% + 7px); left:0; min-width:220px; z-index:40;
    background:var(--glass-solid); border:1px solid var(--border); border-radius:13px; box-shadow:var(--shadow);
    padding:6px; display:none; flex-direction:column; gap:1px;
  }
  .menu.open { display:flex; }
  .menu .mi { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:9px; cursor:pointer; font-size:12.5px; transition:background .12s; }
  .menu .mi:hover { background:var(--accent-soft); }
  .menu .mi .mic { width:26px; height:26px; border-radius:7px; display:grid; place-items:center; flex:none; }
  .menu .mi .mic svg { width:15px; height:15px; stroke:#fff; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
  .menu .mi .mt { font-weight:600; }
  .menu .mi .md { display:block; font-size:10.5px; color:var(--text-dim); font-weight:450; margin-top:1px; }
  .menu .mdiv { height:1px; background:var(--border); margin:4px 2px; }

  /* ---------- Graph ---------- */
  main { flex:1 1 auto; position:relative; overflow:hidden; }
  svg#graph { width:100%; height:100%; display:block; cursor:grab; touch-action:none; }
  svg#graph.panning { cursor:grabbing; }
  svg#graph.linking { cursor:crosshair; }

  .grp rect { transition:opacity .2s; }
  .grp .g-label { font-weight:750; font-size:11.5px; letter-spacing:.3px; }
  .grp .g-badge { font-weight:600; font-size:9.5px; letter-spacing:.4px; text-transform:uppercase; }
  .grp .g-ico svg { fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
  .grp.faded { opacity:.4; }

  .link { fill:none; stroke:var(--edge); stroke-width:1.5; transition:stroke .2s, stroke-width .2s, opacity .2s; }
  .link.hl { stroke:var(--edge-hl); stroke-width:2.3; }
  .link.ref { stroke-dasharray:5 4; stroke-width:1.3; }
  .link.faded { opacity:.1; }
  .link-label { fill:var(--text-dim); font-size:9.5px; font-weight:600; pointer-events:none; paint-order:stroke; stroke:var(--bg); stroke-width:3px; stroke-linejoin:round; transition:opacity .2s; }
  .link-label.faded { opacity:.07; }
  .flow circle { pointer-events:none; }

  .node .halo { fill:none; opacity:0; transition:opacity .18s; }
  .node.hover .halo, .node.selected .halo { opacity:.85; }
  .node .core { stroke:#fff; stroke-width:2.4; transition:transform .16s cubic-bezier(.34,1.56,.64,1); transform-box:fill-box; transform-origin:center; }
  :root[data-theme="dark"] .node .core { stroke:rgba(255,255,255,.7); }
  .node.hover .core { transform:scale(1.13); }
  .node .nico { stroke:#fff; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; pointer-events:none; }
  .node .ext-ring { fill:none; stroke-width:1.8; stroke-dasharray:3 3; opacity:.75; }
  .node .label { fill:var(--text); font-size:11px; font-weight:650; text-anchor:middle; pointer-events:none; paint-order:stroke; stroke:var(--bg); stroke-width:3.5px; stroke-linejoin:round; transition:opacity .2s; }
  .node .sub { fill:var(--text-mute); font-size:8.5px; font-weight:600; text-anchor:middle; pointer-events:none; paint-order:stroke; stroke:var(--bg); stroke-width:3px; stroke-linejoin:round; letter-spacing:.2px; }
  .node { cursor:pointer; }
  .node.dim { opacity:.18; }
  .node.dim .label, .node.dim .sub { opacity:0; }
  .node .pin { opacity:0; transition:opacity .15s; pointer-events:none; }
  .node.pinned .pin { opacity:1; }
  .grp { cursor:grab; }
  .grp.dragging { cursor:grabbing; }
  .alert-badge .ab-t { font-size:10px; font-weight:800; pointer-events:none; }
  .alert-badge.down circle { animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:.45; } }

  /* mode control */
  .segmented { display:inline-flex; background:var(--panel-2); border-radius:9px; padding:2px; gap:2px; }
  .segmented button { border:none; background:transparent; color:var(--text-dim); font-size:11.5px; font-weight:600; padding:5px 10px; border-radius:7px; cursor:pointer; font-family:inherit; transition:background .12s,color .12s; }
  .segmented button.on { background:var(--glass-solid); color:var(--text); box-shadow:var(--shadow-sm); }

  /* overview drawer */
  .overview {
    position:absolute; top:12px; left:12px; bottom:12px; width:320px; z-index:24;
    background:var(--glass); backdrop-filter:blur(24px) saturate(1.5); -webkit-backdrop-filter:blur(24px) saturate(1.5);
    border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow);
    transform:translateX(calc(-100% - 22px)); transition:transform .34s cubic-bezier(.22,1,.36,1);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .overview.open { transform:translateX(0); }
  .overview .oh { display:flex; align-items:center; gap:9px; padding:15px 16px 10px; font-weight:750; font-size:14px; }
  .overview .oh .close { margin-left:auto; cursor:pointer; color:var(--text-dim); width:30px; height:30px; border-radius:9px; border:none; background:var(--panel-2); display:grid; place-items:center; }
  .overview .ob { padding:0 16px 16px; overflow-y:auto; flex:1; }
  .overview .ob::-webkit-scrollbar { width:8px; } .overview .ob::-webkit-scrollbar-thumb { background:var(--border-strong); border-radius:8px; }
  .kpis { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:6px; }
  .kpi { background:var(--panel-2); border-radius:11px; padding:11px 12px; }
  .kpi .kv { font-size:21px; font-weight:750; line-height:1; }
  .kpi .kl { font-size:10.5px; color:var(--text-dim); margin-top:4px; font-weight:600; }
  .osec { font-size:10.5px; font-weight:750; letter-spacing:.5px; text-transform:uppercase; color:var(--text-mute); margin:16px 0 8px; }
  .statusbar { display:flex; height:10px; border-radius:6px; overflow:hidden; margin-bottom:8px; background:var(--panel-2); }
  .statusbar span { height:100%; }
  .statuslegend { display:flex; flex-wrap:wrap; gap:8px 12px; }
  .statuslegend .sl { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text-dim); }
  .statuslegend .sd { width:9px; height:9px; border-radius:3px; }
  .attn { display:flex; flex-direction:column; gap:6px; }
  .attn-item { display:flex; align-items:center; gap:9px; padding:9px 11px; background:var(--panel-2); border:1px solid transparent; border-left-width:3px; border-radius:9px; cursor:pointer; transition:border-color .14s, transform .1s; }
  .attn-item:hover { transform:translateX(2px); }
  .attn-item .ai-ic { width:8px; height:8px; border-radius:50%; flex:none; }
  .attn-item .ai-body { min-width:0; flex:1; }
  .attn-item .ai-t { font-size:12.5px; font-weight:650; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .attn-item .ai-s { font-size:10.5px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .attn-item .ai-sev { font-size:9.5px; font-weight:700; padding:2px 7px; border-radius:20px; color:#fff; flex:none; }
  .empty-note { font-size:12px; color:var(--text-mute); padding:10px 2px; }

  /* incident / column editors */
  .subhead { display:flex; align-items:center; margin:14px 0 6px; }
  .subhead label { margin:0; }
  .subhead .add-mini { margin-left:auto; font-size:11px; font-weight:600; color:var(--accent); cursor:pointer; padding:3px 8px; border-radius:7px; background:var(--accent-soft); }
  .rowlist { display:flex; flex-direction:column; gap:6px; }
  .erow { display:flex; align-items:center; gap:6px; background:var(--panel-2); border:1px solid var(--border); border-radius:9px; padding:6px 8px; }
  .erow input, .erow select { padding:5px 7px; border-radius:6px; font-size:11.5px; border:1px solid transparent; background:var(--glass-solid); }
  .erow input.grow { flex:1; min-width:0; }
  .erow .sev-sel { width:64px; } .erow .st-sel { width:58px; } .erow .ty { width:78px; }
  .erow .rm { cursor:pointer; color:var(--text-mute); border:none; background:none; font-size:15px; padding:0 2px; flex:none; }
  .erow .pk { display:flex; align-items:center; gap:3px; font-size:10.5px; color:var(--text-dim); flex:none; }
  .impact-btns { display:flex; gap:8px; margin-top:6px; }
  .impact-btns .btn { flex:1; justify-content:center; padding:8px; font-size:12px; }

  /* ---------- Inspector ---------- */
  aside {
    position:absolute; top:12px; right:12px; bottom:12px; width:344px;
    background:var(--glass); backdrop-filter:blur(24px) saturate(1.5); -webkit-backdrop-filter:blur(24px) saturate(1.5);
    border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow);
    transform:translateX(calc(100% + 22px)); transition:transform .34s cubic-bezier(.22,1,.36,1);
    display:flex; flex-direction:column; z-index:25; overflow:hidden;
  }
  aside.open { transform:translateX(0); }
  aside .head { display:flex; align-items:center; gap:11px; padding:15px 15px 8px; }
  aside .head .big-icon { width:40px; height:40px; border-radius:12px; display:grid; place-items:center; box-shadow:var(--shadow-sm); flex:none; }
  aside .head .big-icon svg { width:21px; height:21px; stroke:#fff; fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
  aside .head .meta { min-width:0; }
  aside .head .meta h3 { margin:0; font-size:14.5px; font-weight:700; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  aside .head .meta .type-chip { font-size:10.5px; font-weight:650; color:var(--text-dim); }
  aside .head .close { margin-left:auto; cursor:pointer; color:var(--text-dim); width:30px; height:30px; border-radius:9px; border:none; background:var(--panel-2); display:grid; place-items:center; transition:background .14s; flex:none; }
  aside .head .close:hover { background:var(--accent-soft); color:var(--text); }
  .breadcrumb { padding:2px 16px 10px; font-size:10.5px; color:var(--text-dim); display:flex; flex-wrap:wrap; gap:4px; align-items:center; }
  .breadcrumb .bc { color:var(--text); font-weight:600; }
  .breadcrumb .sepc { color:var(--text-mute); }
  aside .body { padding:2px 16px 14px; overflow-y:auto; flex:1; }
  aside .body::-webkit-scrollbar { width:8px; }
  aside .body::-webkit-scrollbar-thumb { background:var(--border-strong); border-radius:8px; }
  .fld { margin-top:13px; }
  .fld.hide { display:none; }
  aside label { display:block; font-size:10px; color:var(--text-dim); margin:0 0 5px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; }
  aside input, aside textarea, aside select {
    width:100%; padding:9px 11px; border:1px solid var(--border); background:var(--panel-2); color:var(--text);
    border-radius:9px; font-size:13px; font-family:inherit; outline:none; transition:border-color .14s, background .14s;
  }
  aside input:focus, aside textarea:focus, aside select:focus { border-color:var(--accent); background:var(--glass-solid); }
  aside textarea { resize:vertical; min-height:56px; line-height:1.5; }
  .tagbox { display:flex; flex-wrap:wrap; gap:5px; margin-top:7px; }
  .tag { font-size:10.5px; padding:3px 9px; border-radius:20px; background:var(--accent-soft); color:var(--accent); font-weight:600; }
  .conn-list { margin-top:7px; display:flex; flex-direction:column; gap:6px; }
  .conn { display:flex; align-items:center; gap:8px; font-size:12px; padding:8px 10px; background:var(--panel-2); border:1px solid transparent; border-radius:9px; cursor:pointer; transition:border-color .14s, transform .1s; }
  .conn:hover { border-color:var(--accent); transform:translateX(2px); }
  .conn .arrow { color:var(--text-dim); font-weight:700; font-size:12px; flex:none; }
  .conn .cdot { width:9px; height:9px; border-radius:3px; flex:none; }
  .conn .cl { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .conn small { color:var(--text-mute); margin-left:auto; font-size:10px; flex:none; }
  .aside-actions { display:flex; gap:8px; padding:11px 16px; border-top:1px solid var(--border); }
  .aside-actions .btn { flex:1; justify-content:center; padding:9px; }
  .btn.danger { color:#e11d48; background:rgba(225,29,72,.09); }
  :root[data-theme="dark"] .btn.danger { color:#fda4af; background:rgba(251,113,133,.12); }

  /* ---------- Docks ---------- */
  .dock { position:absolute; left:12px; bottom:12px; z-index:18; display:flex; flex-direction:column; gap:9px; }
  .panel { background:var(--glass); backdrop-filter:blur(18px) saturate(1.4); -webkit-backdrop-filter:blur(18px) saturate(1.4); border:1px solid var(--border); border-radius:13px; box-shadow:var(--shadow-sm); }
  .legend { padding:10px 12px; font-size:11.5px; }
  .legend .lt { font-size:9.5px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--text-mute); margin:2px 0 5px; }
  .legend .row { display:flex; align-items:center; gap:8px; margin:3px 0; color:var(--text-dim); cursor:pointer; border-radius:6px; padding:1px 2px; transition:color .14s, opacity .14s; }
  .legend .row:hover { color:var(--text); }
  .legend .row.off { opacity:.35; }
  .legend .row.off .swatch { filter:grayscale(1); }
  .legend .swatch { width:12px; height:12px; border-radius:4px; flex:none; box-shadow:inset 0 0 0 1.3px rgba(255,255,255,.45); }
  .legend .swatch.round { border-radius:50%; }
  .minimap-wrap { padding:6px; }
  #minimap { display:block; border-radius:8px; cursor:pointer; }
  .mm-view { fill:var(--accent-soft); stroke:var(--accent); stroke-width:1.3; }

  .rightdock { position:absolute; right:12px; bottom:12px; z-index:18; display:flex; flex-direction:column; gap:8px; align-items:flex-end; transition:right .34s cubic-bezier(.22,1,.36,1); }
  aside.open ~ .rightdock { right:368px; }
  .zoom-ctl { display:flex; flex-direction:column; overflow:hidden; }
  .zoom-ctl button { width:38px; height:36px; border:none; background:transparent; color:var(--text); cursor:pointer; display:grid; place-items:center; transition:background .12s; }
  .zoom-ctl button:hover { background:var(--accent-soft); }
  .zoom-ctl button + button { border-top:1px solid var(--border); }
  .zoom-ctl svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .status { padding:7px 12px; font-size:11px; color:var(--text-dim); white-space:nowrap; }
  .status b { color:var(--text); font-weight:700; }

  .toast { position:absolute; top:70px; left:50%; z-index:45; transform:translateX(-50%) translateY(-14px);
    background:var(--glass-solid); color:var(--text); padding:10px 18px; border-radius:12px; font-size:12.5px; font-weight:600;
    box-shadow:var(--shadow); border:1px solid var(--border); opacity:0; pointer-events:none; transition:opacity .22s, transform .22s; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  input[type=file] { display:none; }
  #nodesG { transition:opacity .5s; }

  @media (max-width:760px) {
    .brand small { display:none; }
    aside { width:calc(100% - 24px); }
    aside.open ~ .rightdock { right:12px; }
    .search input { width:86px; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <span class="logo"><svg viewBox="0 0 24 24"><circle cx="6" cy="7" r="2.4"/><circle cx="18" cy="6" r="2.4"/><circle cx="12" cy="17" r="2.4"/><path d="M8 8l3 7M16 8l-3 7M8 7h8"/></svg></span>
      System Graph <small>システム構成 / データリネージ</small>
    </div>
    <div class="sep"></div>

<script>

(function () {

      { id:"t_lead", type:"table", parent:"db_sf", label:"Lead", desc:"見込み客", schema:"sObject" },
      // tables (ERP)
      { id:"t_order", type:"table", parent:"db_erp", label:"ORDERS", desc:"受注明細", schema:"SALES",
        columns:[ {name:"ORDER_ID", type:"NUMBER", pk:true}, {name:"ACCOUNT_CD", type:"VARCHAR2"}, {name:"AMOUNT", type:"NUMBER"}, {name:"ORDER_DATE", type:"DATE"} ] },
      { id:"t_bill", type:"table", parent:"db_erp", label:"BILLING", desc:"請求", schema:"SALES", tags:["PII"] },

    edges: [
      { id:"e1", source:"t_order", target:"j_night", label:"抽出", kind:"read" },
      { id:"e2", source:"t_inv",  target:"j_night", label:"抽出", kind:"read" },

  // ---------------- State ----------------
  let data = load();
  let selectedId = null, hoverId = null;
  let linkMode = false, linkSource = null;
  const hidden = new Set();
  const view = { x:0, y:0, k:1 };
  let groupBoxes = {};

  const svg=$("#graph"), gViewport=$("#viewport"), gOuter=$("#groupsOuter"), gInner=$("#groupsInner"),
        gNodes=$("#nodesG"), gLinks=$("#linksG"), gLabels=$("#labelsG"), gFlow=$("#flowG");

  // ---------------- Persistence ----------------
  function load(){
    try{ const raw=localStorage.getItem(STORE_KEY); if(raw) return normalize(JSON.parse(raw)); }catch(e){}
    return normalize(JSON.parse(JSON.stringify(SEED)));
  }
  function normalize(d){
    d.nodes=(d.nodes||[]).map(n=>{
      const node={ tags:[], desc:"", owner:"", tech:"", parent:null, ...n,
        x: typeof n.x==="number"? n.x : Math.cos(Math.random()*6.28)*260,
        y: typeof n.y==="number"? n.y : Math.sin(Math.random()*6.28)*260, vx:0, vy:0 };
      if(node.pinned){ node.fx=node.x; node.fy=node.y; }
      return node;
    });
    const ids=new Set(d.nodes.map(n=>n.id));
    d.edges=(d.edges||[]).filter(e=>ids.has(e.source)&&ids.has(e.target));
    return d;
  }
  function save(){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify({
      nodes:data.nodes.map(({vx,vy,fx,fy,...r})=>({...r,x:Math.round(r.x),y:Math.round(r.y)})), edges:data.edges
    })); }catch(e){}

  // ---------------- Derived ----------------
  let byId={}, degree={};
  function recompute(){
    byId=Object.fromEntries(data.nodes.map(n=>[n.id,n]));
    degree={}; for(const n of data.nodes) degree[n.id]=0;
    for(const e of data.edges){ degree[e.source]=(degree[e.source]||0)+1; degree[e.target]=(degree[e.target]||0)+1; }
  }
  const leaves=()=>data.nodes.filter(isLeaf);
  const containers=()=>data.nodes.filter(isContainer);
  function radius(n){ return 14 + Math.min(degree[n.id]||0,8)*2; }
  function topAncestor(n){ let c=n, guard=0; while(c && c.parent && byId[c.parent] && guard++<6) c=byId[c.parent]; return c? c.id : n.id; }
  function isHiddenNode(n){
    if(hidden.has(n.type)) return true;
    let c=n, guard=0; while(c && c.parent && byId[c.parent] && guard++<6){ c=byId[c.parent]; if(hidden.has(c.type)) return true; }
    return false;
  }
  function pathOf(n){ const arr=[]; let c=n, guard=0; while(c && guard++<6){ arr.unshift(c); c=c.parent?byId[c.parent]:null; } return arr; }
  function ancestorIds(n){ const s=[]; let c=n, g=0; while(c && c.parent && byId[c.parent] && g++<6){ c=byId[c.parent]; s.push(c.id); } return s; }
  function descendantLeaves(cid){ return leaves().filter(n=>ancestorIds(n).includes(cid)); }
  function openIncidents(n){ return (n.incidents||[]).filter(i=>i.status!=="closed"); }
  function maxSeverity(list){ let best=null; for(const i of list){ const s=SEVERITY[i.severity]; if(s&&(!best||s.rank>best.rank)) best=s; } return best; }
  function daysUntil(dateStr){ if(!dateStr) return null; const d=new Date(dateStr); if(isNaN(d)) return null; return Math.ceil((d-new Date())/86400000); }
  // returns {level:'down'|'warn', color, reason} or null — problems that must pop at a glance
  function alertOf(n){
    const inc=openIncidents(n); const sev=maxSeverity(inc);
    if(n.health==="down" || (sev&&sev.rank>=4)) return { level:"down", color:HEALTH.down.color, reason: sev?`障害/重大インシデント ${inc.length}件`:"障害中" };
    const du=daysUntil(n.renewal);
    if(n.health==="warn" || (sev&&sev.rank>=2) || (du!=null&&du<=90))
      return { level:"warn", color:HEALTH.warn.color, reason: inc.length?`未解決 ${inc.length}件`:(du!=null?`更改まで${du<0?"超過":du+"日"}`:"注意") };
    if(inc.length) return { level:"warn", color:HEALTH.warn.color, reason:`未解決 ${inc.length}件` };
    return null;
  }
  // container alert = its own + worst of descendants
  function groupAlert(c){
    let best=alertOf(c);
    for(const k of descendantLeaves(c.id)){ const a=alertOf(k); if(a&&(!best||(a.level==="down"&&best.level!=="down"))) best=a; }
    return best;
  }
  function nodeColor(n){
    if(colorMode==="status"){ const s=STATUS[n.status]; return s?s.color:"#94a3b8"; }
    if(colorMode==="health"){ const a=alertOf(n); return a?a.color:HEALTH.ok.color; }
    return TYPE[n.type].color;
  }
  function nodeFill(n){ return colorMode==="type" ? (TYPE[n.type].grad||TYPE[n.type].color) : nodeColor(n); }
  function containerColor(c){
    if(colorMode==="status"){ const s=STATUS[c.status]; return s?s.color:TYPE[c.type].color; }
    if(colorMode==="health"){ const a=groupAlert(c); return a?a.color:TYPE[c.type].color; }
    return TYPE[c.type].color;
  }

  // ---------------- Physics (leaves only) ----------------
  let alpha=1;
  function reheat(a=0.9){ alpha=Math.max(alpha,a); }
  function physics(){
    if(alpha<0.004) return; alpha*=0.987;
    const L=leaves();
    // group centroids
    const pc={}, sc={};
    for(const n of L){ const p=n.parent||"_", s=topAncestor(n);
      (pc[p]||(pc[p]={x:0,y:0,c:0})); pc[p].x+=n.x; pc[p].y+=n.y; pc[p].c++;
      (sc[s]||(sc[s]={x:0,y:0,c:0})); sc[s].x+=n.x; sc[s].y+=n.y; sc[s].c++;
    }
    for(const k in pc){ pc[k].x/=pc[k].c; pc[k].y/=pc[k].c; }
    for(const k in sc){ sc[k].x/=sc[k].c; sc[k].y/=sc[k].c; }
    // repulsion (group-aware)
    for(let i=0;i<L.length;i++) for(let j=i+1;j<L.length;j++){
      const a=L[i], b=L[j];
      let dx=a.x-b.x, dy=a.y-b.y, d2=dx*dx+dy*dy||0.01, d=Math.sqrt(d2);
      let m = (a.parent&&a.parent===b.parent)?0.5 : (topAncestor(a)===topAncestor(b))?0.95 : 1.5;
      const rep=6000*m/d2, fx=dx/d*rep, fy=dy/d*rep;
      a.vx+=fx; a.vy+=fy; b.vx-=fx; b.vy-=fy;
    }
    // edge springs (leaf-leaf)
    for(const e of data.edges){
      const a=byId[e.source], b=byId[e.target]; if(!a||!b||!isLeaf(a)||!isLeaf(b)) continue;
      let dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)||0.01;
      const f=(d-165)*0.02, fx=dx/d*f, fy=dy/d*f;
      a.vx+=fx; a.vy+=fy; b.vx-=fx; b.vy-=fy;
    }
    // cohesion + centering + integrate
    for(const n of L){
      const p=pc[n.parent||"_"], s=sc[topAncestor(n)];
      if(p){ n.vx+=(p.x-n.x)*0.03; n.vy+=(p.y-n.y)*0.03; }
      if(s){ n.vx+=(s.x-n.x)*0.008; n.vy+=(s.y-n.y)*0.008; }
      n.vx+=-n.x*0.0016; n.vy+=-n.y*0.0016;
      if(n.fx!=null){ n.x=n.fx; n.y=n.fy; n.vx=0; n.vy=0; continue; }
      n.vx*=0.84; n.vy*=0.84; n.x+=n.vx*alpha*1.5; n.y+=n.vy*alpha*1.5;
    }
  }

  // ---------------- Helpers ----------------
  function el(tag,attrs,parent){ const e=document.createElementNS(SVG_NS,tag); for(const k in attrs) e.setAttribute(k,attrs[k]); if(parent) parent.appendChild(e); return e; }
  function iconG(type,size,parent,strokeVar){

    g.setAttribute("stroke-width",1.8); g.setAttribute("stroke-linecap","round"); g.setAttribute("stroke-linejoin","round");
    return g;
  }

  // ---------------- Render ----------------
  function render(){
    recompute();
    gNodes.innerHTML=""; gLinks.innerHTML=""; gLabels.innerHTML=""; gFlow.innerHTML=""; gOuter.innerHTML=""; gInner.innerHTML="";

    // container elements

      const t=TYPE[c.type], layer = t.depth===0? gOuter : gInner, col=containerColor(c);
      const g=el("g",{class:"grp","data-id":c.id}, layer);
      g._node=c;
      el("rect",{class:"g-rect", rx:14, fill:col, "fill-opacity": t.depth===0?0.06:0.1, stroke:col, "stroke-opacity":0.55, "stroke-width":1.5, "stroke-dasharray": c.type==="platform"?"7 5":"0"}, g);
      const ico=iconG(t.icon,15,g,col); ico.classList.add("g-ico"); ico._role="ico";
      const lab=el("text",{class:"g-label", fill:col}, g); lab.textContent=c.label; lab._role="label";
      const badge=el("text",{class:"g-badge", fill:col, "fill-opacity":0.8}, g); badge._role="badge";
      const st=STATUS[c.status]; const baseBadge = c.type==="database" ? (c.engine||"DB") : c.type==="platform" ? (c.kind||"ETL") : "SYSTEM";
      badge.textContent = st ? baseBadge+" · "+st.label : baseBadge;
      const ga=groupAlert(c);
      if(ga){ const ab=el("g",{class:"alert-badge"}, g); ab._role="alert"; ab._alert=ga;
        el("circle",{r:8, fill:ga.color, stroke:"var(--bg)", "stroke-width":2}, ab);
        const tx=el("text",{class:"ab-t","text-anchor":"middle", y:3.2, fill:"#fff"}, ab); tx.textContent="!"; }
      attachGroup(g,c);
    }

    // edges + flow
    for(const e of data.edges){
      const a=byId[e.source], b=byId[e.target]; const hide=a&&b&&(isHiddenNode(a)||isHiddenNode(b));
      const p=el("path",{class:"link"+(e.kind==="ref"?" ref":""),"marker-end":"url(#arrow)"}, gLinks); p._edge=e; if(hide)p.style.display="none";
      const lbl=el("text",{class:"link-label","text-anchor":"middle"}, gLabels); lbl.textContent=e.label||""; lbl._edge=e; if(hide)lbl.style.display="none";
      if(e.kind!=="ref"){

        fc._edge=e; fc._path=p; fc._t=Math.random(); wrap._edge=e; if(hide)wrap.style.display="none";
      }
    }

    // leaf nodes

      const g=el("g",{class:"node","data-id":n.id}, gNodes); g._node=n; if(isHiddenNode(n)) g.style.display="none";
      const t=TYPE[n.type], r=radius(n), col=nodeColor(n);
      el("circle",{class:"halo", r:r+6, fill:"none", stroke:col, "stroke-width":2.4, "stroke-opacity":0.5}, g);
      el("circle",{class:"core", r:r, fill:nodeFill(n)}, g);
      if(n.type==="external") el("circle",{class:"ext-ring", r:r+3.5, stroke:col}, g);
      const ico=iconG(t.icon, Math.round(r*1.05), g, "#fff"); ico.classList.add("nico");
      const lab=el("text",{class:"label", y:r+14}, g); lab.textContent=n.label||"(無題)";
      const subTxt = subtitleOf(n);
      if(subTxt){ const sub=el("text",{class:"sub", y:r+25}, g); sub.textContent=subTxt; }
      el("circle",{class:"pin", cx:r*0.72, cy:-r*0.72, r:3, fill:"var(--accent)", stroke:"#fff", "stroke-width":1.4}, g);
      const na=alertOf(n);
      if(na){ const ab=el("g",{class:"alert-badge"+(na.level==="down"?" down":"")}, g); ab.setAttribute("transform",`translate(${-r*0.72},${-r*0.72})`);
        el("circle",{r:7, fill:na.color, stroke:"#fff", "stroke-width":1.6}, ab);
        const tx=el("text",{class:"ab-t","text-anchor":"middle", y:2.8, fill:"#fff"}, ab); tx.textContent="!"; }
      if(n.pinned) g.classList.add("pinned");
      attachNode(g,n);
    }

  }
  function subtitleOf(n){
    if(n.type==="table"){ const db=n.parent?byId[n.parent]:null; return db?db.label:(n.schema||""); }
    if(n.type==="job"){ const pf=n.parent?byId[n.parent]:null; return pf?pf.label:""; }
    return "";
  }

  // ---------------- Layout / geometry ----------------
  function computeGroups(){
    const boxes={};
    const grp=(arr,padL,padT,padR,padB)=>{
      let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
      for(const it of arr){ minX=Math.min(minX,it.x0); minY=Math.min(minY,it.y0); maxX=Math.max(maxX,it.x1); maxY=Math.max(maxY,it.y1); }
      return {x:minX-padL, y:minY-padT, w:(maxX-minX)+padL+padR, h:(maxY-minY)+padT+padB};
    };
    // databases from tables, platforms from jobs
    const byParent={};
    for(const n of leaves()){ if((n.type==="table"||n.type==="job")&&n.parent){ (byParent[n.parent]||(byParent[n.parent]=[])).push(n); } }
    for(const pid in byParent){
      const items=byParent[pid].map(n=>{ const r=radius(n)+18; return {x0:n.x-r,y0:n.y-r,x1:n.x+r,y1:n.y+r}; });
      boxes[pid]=grp(items,14,30,14,14);
    }
    // systems from database boxes
    const sysDb={};
    for(const c of containers()){ if(c.type==="database"&&c.parent&&boxes[c.id]){ (sysDb[c.parent]||(sysDb[c.parent]=[])).push(boxes[c.id]); } }
    for(const sid in sysDb){
      const items=sysDb[sid].map(b=>({x0:b.x,y0:b.y,x1:b.x+b.w,y1:b.y+b.h}));
      boxes[sid]=grp(items,14,34,14,14);
    }
    groupBoxes=boxes;
    for(const c of containers()){ const b=boxes[c.id]; if(b){ c.x=b.x+b.w/2; c.y=b.y+b.h/2; } }
  }
  function centerOfId(id){ const n=byId[id]; if(!n) return {x:0,y:0}; if(isLeaf(n)) return {x:n.x,y:n.y}; const b=groupBoxes[id]; return b?{x:b.x+b.w/2,y:b.y+b.h/2}:{x:n.x||0,y:n.y||0}; }
  function anchor(id, tx, ty, gap){
    const n=byId[id]; if(!n) return {x:tx,y:ty};
    if(isLeaf(n)){ const r=radius(n)+(gap||0); const dx=tx-n.x, dy=ty-n.y, d=Math.hypot(dx,dy)||1; return {x:n.x+dx/d*r, y:n.y+dy/d*r}; }
    const b=groupBoxes[id]; if(!b) return {x:n.x||0,y:n.y||0};
    const cx=b.x+b.w/2, cy=b.y+b.h/2, dx=tx-cx, dy=ty-cy;
    const hw=b.w/2+(gap||0), hh=b.h/2+(gap||0);
    const t=Math.min(dx===0?1e9:hw/Math.abs(dx), dy===0?1e9:hh/Math.abs(dy));
    return {x:cx+dx*t, y:cy+dy*t};
  }

  function positionAll(){
    // leaves
    for(const g of gNodes.children){ const n=g._node; g.setAttribute("transform",`translate(${n.x},${n.y})`); }
    computeGroups();
    // container rects
    for(const layer of [gOuter,gInner]) for(const g of layer.children){
      const c=g._node, b=groupBoxes[c.id];
      if(!b){ g.style.display="none"; continue; } g.style.display="";
      const rect=g.querySelector(".g-rect"); rect.setAttribute("x",b.x); rect.setAttribute("y",b.y); rect.setAttribute("width",b.w); rect.setAttribute("height",b.h);
      const ico=[...g.children].find(x=>x._role==="ico"); if(ico) ico.setAttribute("transform",`translate(${b.x+18},${b.y+16}) scale(${15/24}) translate(-12,-12)`);
      const lab=[...g.children].find(x=>x._role==="label"); if(lab){ lab.setAttribute("x",b.x+30); lab.setAttribute("y",b.y+20); }
      const badge=[...g.children].find(x=>x._role==="badge");
      if(badge){ const lw=(lab&&lab.getComputedTextLength)?lab.getComputedTextLength():60; badge.setAttribute("x",b.x+30+lw+8); badge.setAttribute("y",b.y+20); }
      const alert=[...g.children].find(x=>x._role==="alert"); if(alert) alert.setAttribute("transform",`translate(${b.x+b.w-15},${b.y+15})`);
    }
    // edges
    for(const p of gLinks.children){
      const e=p._edge, ca=centerOfId(e.source), cb=centerOfId(e.target);
      const a=anchor(e.source, cb.x, cb.y, 0), b=anchor(e.target, ca.x, ca.y, 7);
      p.setAttribute("d", `M${a.x.toFixed(1)},${a.y.toFixed(1)} L${b.x.toFixed(1)},${b.y.toFixed(1)}`);
    }
    for(const l of gLabels.children){
      const e=l._edge, ca=centerOfId(e.source), cb=centerOfId(e.target);
      l.setAttribute("x",(ca.x+cb.x)/2); l.setAttribute("y",(ca.y+cb.y)/2-3);
    }
  }
  function applyViewport(){ gViewport.setAttribute("transform",`translate(${view.x},${view.y}) scale(${view.k})`); renderMinimap(); }

  // ---------------- Flow ----------------
  function animateFlow(){
    for(const wrap of gFlow.children){
      const fc=wrap.firstChild; if(!fc) continue; const e=fc._edge;
      if(wrap.style.display==="none"){ fc.setAttribute("opacity",0); continue; }
      const focus=selectedId||hoverId, on=focus&&(e.source===focus||e.target===focus), dim=focus&&!on;
      fc._t+=0.0016*(on?2.4:1); if(fc._t>1) fc._t-=1;
      let pt; try{ const len=fc._path.getTotalLength(); if(!len){fc.setAttribute("opacity",0);continue;} pt=fc._path.getPointAtLength(len*fc._t); }catch(err){ continue; }
      fc.setAttribute("cx",pt.x); fc.setAttribute("cy",pt.y);
      fc.setAttribute("opacity", dim?0.05 : on?0.95:0.5);
      fc.setAttribute("fill", on?"var(--edge-hl)":"var(--edge)"); fc.setAttribute("r", on?3.3:2.6);
    }
  }

  // ---------------- Highlight ----------------
  function updateHighlight(){
    const focus=selectedId||hoverId;
    // active = set of nodes to keep bright; when impactSet is on, it takes over
    let active=null;
    if(impactSet) active=impactSet;
    else if(focus){ active=new Set([focus]); for(const e of data.edges){ if(e.source===focus)active.add(e.target); if(e.target===focus)active.add(e.source); } }
    const dimAll=!!active;
    for(const g of gNodes.children){ const id=g._node.id;
      g.classList.toggle("selected",id===selectedId); g.classList.toggle("hover",id===hoverId);
      g.classList.toggle("dim", dimAll && !active.has(id));
    }
    for(const layer of [gOuter,gInner]) for(const g of layer.children){
      const cid=g._node.id, kids=descendantLeaves(cid).map(k=>k.id);
      const inActive = active && (active.has(cid) || kids.some(k=>active.has(k)));
      g.classList.toggle("faded", dimAll && cid!==selectedId && !inActive);
    }
    for(const p of gLinks.children){ const e=p._edge;
      const on = active ? (active.has(e.source)&&active.has(e.target)) : false;
      p.classList.toggle("hl",!!on); p.classList.toggle("faded",dimAll&&!on); p.setAttribute("marker-end",on?"url(#arrow-hl)":"url(#arrow)");
    }
    for(const l of gLabels.children){ const e=l._edge; const on=active?(active.has(e.source)&&active.has(e.target)):false; l.classList.toggle("faded",dimAll&&!on); }
  }

    $("#fEngine").value=n.engine||""; $("#fKind").value=n.kind||""; $("#fSchema").value=n.schema||""; $("#fSchedule").value=n.schedule||"";
    $("#fStatus").value=n.status||""; $("#fCrit").value=n.criticality||""; $("#fHealth").value=n.health||"";

  function toggleFields(type){

  function populateParent(n){
    const need = TYPE[n.type].parent; const sel=$("#fParent"); sel.innerHTML="";
    if(!need) return;
    const o0=document.createElement("option"); o0.value=""; o0.textContent="（未設定）"; sel.appendChild(o0);

  function renderConns(n){

    for(const e of data.edges){ if(e.source===n.id)conns.push({o:byId[e.target],dir:"→",l:e.label,k:e.kind}); else if(e.target===n.id)conns.push({o:byId[e.source],dir:"←",l:e.label,k:e.kind}); }
    if(!conns.length){ list.innerHTML='<div style="font-size:12px;color:var(--text-mute)">接続なし</div>'; return; }
    for(const c of conns){ if(!c.o) continue; const d=document.createElement("div"); d.className="conn";
      d.innerHTML=`<span class="arrow">${c.dir}</span><span class="cdot" style="background:${TYPE[c.o.type].color}"></span><span class="cl">${esc(c.o.label)}</span><small>${esc(c.l||"")}</small>`;

  function esc(s){ return String(s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }

  function bindField(sel,apply){ $(sel).addEventListener("input",()=>{ const n=byId[selectedId]; if(!n) return; apply(n,$(sel).value); save(); }); }
  bindField("#fName",(n,v)=>{ n.label=v; $("#insTitle").textContent=v; softRefresh(); });

        <div class="kpi"><div class="kv">${(c.database||0)}</div><div class="kl">データベース</div></div>
        <div class="kpi"><div class="kv">${c.table||0}</div><div class="kl">テーブル</div></div>
        <div class="kpi"><div class="kv">${(c.platform||0)}</div><div class="kl">連携基盤</div></div>
        <div class="kpi"><div class="kv">${c.job||0}</div><div class="kl">ジョブ</div></div>
        <div class="kpi"><div class="kv">${data.edges.length}</div><div class="kl">データ連携</div></div>
      </div>
      <div class="osec">システム稼働ステータス</div>
      <div class="statusbar">${bar||'<span style="width:100%;background:var(--text-mute)"></span>'}</div>
      <div class="statuslegend">${slg||'<span class="sl">未登録</span>'}</div>
      <div class="osec">要対応（障害・更改）<span style="color:var(--text-mute);font-weight:600">　${attn.length}件</span></div>
      <div class="attn" id="attnList"></div>`;

    const al=$("#attnList");
    if(!attn.length){ al.innerHTML='<div class="empty-note">未解決の障害・直近の更改予定はありません 🎉</div>'.replace("🎉",""); }
    else attn.slice(0,30).forEach(a=>{
      const path=pathOf(a.n).map(p=>p.label).join(" › ");
      const d=document.createElement("div"); d.className="attn-item"; d.style.borderLeftColor=a.color;
      d.innerHTML=`<span class="ai-ic" style="background:${a.color}"></span><div class="ai-body"><div class="ai-t">${esc(a.n.label)}</div><div class="ai-s">${esc(path)} · ${esc(a.text)}</div></div><span class="ai-sev" style="background:${a.color}">${esc(a.sevLabel)}</span>`;
      d.onclick=()=>{ select(a.n.id); centerOn(a.n); }; al.appendChild(d);
    });
  }

  // ---------------- Search ----------------
  $("#search").addEventListener("input",(ev)=>{ const q=ev.target.value.trim().toLowerCase();
    for(const g of gNodes.children){ const n=g._node; const par=n.parent?byId[n.parent]:null;
      const hay=(n.label+" "+n.desc+" "+n.owner+" "+n.tech+" "+(n.engine||"")+" "+(n.schema||"")+" "+(par?par.label:"")+" "+(n.tags||[]).join(" ")).toLowerCase();
      g.classList.toggle("dim", q!=="" && !hay.includes(q)); }
    if(q){ const f=leaves().find(n=>!isHiddenNode(n)&&(n.label+" "+n.desc+" "+n.owner+" "+n.tech+" "+(n.engine||"")+" "+(n.schema||"")+" "+(n.tags||[]).join(" ")).toLowerCase().includes(q)); if(f) centerOn(f); }
    else if(!selectedId){ for(const g of gNodes.children) g.classList.remove("dim"); } });

  // ---------------- Keyboard ----------------
  window.addEventListener("keydown",(ev)=>{
    if(ev.target.matches("input,textarea,select")){ if(ev.key==="Escape") ev.target.blur(); return; }
    if(ev.key==="Delete"&&selectedId) $("#delBtn").click();
    if(ev.key==="Escape"){ if(linkMode) setLinkMode(false); else if(overview.classList.contains("open")) closeOverview(); else select(null); closeAddMenu(); }
    if(ev.key==="l"||ev.key==="L") setLinkMode(!linkMode);
    if(ev.key==="f"||ev.key==="F") zoomFit();
    if(ev.key==="r"||ev.key==="R") $("#relayoutBtn").click();
  });

  function updateStatus(){ const c={}; for(const n of data.nodes) c[n.type]=(c[n.type]||0)+1;
    $("#status").innerHTML=`<b>${(c.system||0)+(c.database||0)+(c.platform||0)}</b> グループ · <b>${leaves().length}</b> ノード · <b>${data.edges.length}</b> 連携`; }

  let tt; function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(tt); tt=setTimeout(()=>t.classList.remove("show"),2200); }

  function loop(){ physics(); if(alpha>=0.004) positionAll(); animateFlow(); if(alpha>=0.004) renderMinimap(); requestAnimationFrame(loop); }

  // ---------------- Init ----------------
  syncLegend(); renderModeLegend(); render(); applyViewport(); reheat(1); requestAnimationFrame(loop); setTimeout(zoomFit,800);
})();
</script>
</body>
</html>
